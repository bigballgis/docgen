# ============================================================
# 文档生成平台后端服务配置
# Spring Boot 3.2 + Java 17
# ============================================================

# 服务端口配置
server:
  port: 3001

# Spring 数据源配置
spring:
  # 活跃的配置文件（默认使用开发环境配置）
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}

  # 数据源配置 - PostgreSQL（生产环境）
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/docgen_platform}
    username: ${SPRING_DATASOURCE_USERNAME:docgen}
    password: ${SPRING_DATASOURCE_PASSWORD:docgen}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
    # 连接池配置
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA / Hibernate 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  # H2 控制台（默认禁用，仅在 dev profile 启用）
  h2:
    console:
      enabled: false
      path: /h2-console
      settings:
        web-allow-others: false

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
      enabled: true

  # Jackson JSON 序列化配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

---
# 开发环境配置（使用 H2 内存数据库）
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:file:./data/docgen_dev;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # H2 控制台（开发调试用）
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

---
# 生产环境配置
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

---
# 文件存储配置
file:
  # 文件上传目录
  upload-dir: ./uploads
  # 文件输出目录
  output-dir: ./outputs

---
# JWT 认证配置
jwt:
  # JWT 密钥（生产环境应通过环境变量 JWT_SECRET 覆盖）
  secret: ${JWT_SECRET:}
  # JWT 过期时间：24小时（毫秒）
  expiration: 86400000

---
# 应用配置
app:
  # 应用公开访问地址
  public-url: ${APP_PUBLIC_URL:http://localhost:3001}

---
# Euro Office 集成配置（可选）
euro-office:
  # Euro Office 服务地址
  url: ${EURO_OFFICE_URL:http://localhost:8080}
  # Euro Office JWT 密钥（可选）
  jwt-secret: ${EURO_OFFICE_JWT_SECRET:}

---
# Kafka 消息队列配置（可选）
kafka:
  # 是否启用 Kafka
  enabled: ${KAFKA_ENABLED:false}
  # Kafka 服务器地址
  brokers: ${KAFKA_BROKERS:localhost:9092}

---
# Actuator 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true
