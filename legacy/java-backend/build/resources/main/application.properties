# 应用配置
spring.application.name=docgen-backend

# 服务器配置
server.port=8080

# 数据库配置
spring.datasource.url=jdbc:h2:mem:docgen;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA配置
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# H2 Console配置
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# 文件存储配置
file.storage.template-path=/workspace/legacy/java-backend/templates
file.storage.output-path=/workspace/legacy/java-backend/output

# 日志配置
logging.level.root=info
logging.level.com.docgen=debug