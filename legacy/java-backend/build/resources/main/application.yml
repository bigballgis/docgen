server:
  port: 8080

spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB
  datasource:
    url: jdbc:postgresql://localhost:5432/docgen
    driver-class-name: org.postgresql.Driver
    username: docgen
    password: docgen_secret_2026
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# 文件存储配置
file:
  storage:
    template-dir: ./templates
    output-dir: ./output

# CORS 配置
cors:
  allowed-origins: "*"
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  max-age: 3600
