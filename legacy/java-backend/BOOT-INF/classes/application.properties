# 应用配置
spring.application.name=docgen-backend

# 服务器配置
server.port=8080

# 数据库配置
spring.datasource.url=jdbc:sqlite:/workspace/legacy/java-backend/db/docgen.db
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=org.sqlite.JDBC

# JPA配置
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLiteDialect

# 文件存储配置
file.storage.template-path=/workspace/legacy/java-backend/templates
file.storage.output-path=/workspace/legacy/java-backend/output

# 日志配置
logging.level.root=info
logging.level.com.docgen=debug