# ============================================================
# DocGen Platform - Nginx 主配置
# 反向代理入口，负责路由分发、SSL 终止、安全加固
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ----------------------------------------------------------
    # 日志格式
    # ----------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # ----------------------------------------------------------
    # 性能优化
    # ----------------------------------------------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    client_header_timeout 30s;
    client_body_timeout 30s;
    send_timeout 30s;
    reset_timedout_connection on;

    client_max_body_size 50m;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;

    # ----------------------------------------------------------
    # Gzip 压缩
    # ----------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;

    # ----------------------------------------------------------
    # 上游服务定义
    # ----------------------------------------------------------
    upstream kong_proxy {
        server kong:8000 max_fails=3 fail_timeout=30s;
        keepalive 64;
    }

    upstream euro_office {
        server euro-office:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream grafana {
        server grafana:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ----------------------------------------------------------
    # 隐藏 Nginx 版本号
    # ----------------------------------------------------------
    server_tokens off;

    # ----------------------------------------------------------
    # HTTP → HTTPS 重定向
    # ----------------------------------------------------------
    server {
        listen 80;
        server_name ${SERVER_NAME} _;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # HTTP 到 HTTPS 301 重定向
        location / {
            return 301 https://$host$request_uri;
        }

        include /etc/nginx/conf.d/locations/*.conf;
    }

    # ----------------------------------------------------------
    # HTTPS 服务器
    # ----------------------------------------------------------
    # 注意: 以下使用自签名证书配置，适用于开发/测试环境。
    # 生产环境应替换为 Let's Encrypt 或 CA 签发的真实证书。
    # 生成自签名证书命令 (仅限开发环境):
    #   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
    #     -keyout /etc/nginx/ssl/server.key \
    #     -out /etc/nginx/ssl/server.crt \
    #     -subj "/CN=${SERVER_NAME}"
    server {
        listen 443 ssl http2;
        server_name ${SERVER_NAME};

        ssl_certificate     ${SSL_CERTIFICATE_PATH};
        ssl_certificate_key ${SSL_CERTIFICATE_KEY_PATH};
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # HSTS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # 安全响应头
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        # CSP 策略: 移除 unsafe-eval，仅允许 unsafe-inline 用于内联样式
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: https: blob:; font-src 'self' https: data:; connect-src 'self' https: wss:; frame-ancestors 'self'; base-uri 'self'; form-action 'self' https:;" always;

        # 请求追踪
        proxy_set_header X-Request-ID $request_id;

        include /etc/nginx/conf.d/locations/*.conf;
    }
}
