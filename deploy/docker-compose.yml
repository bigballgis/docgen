services:
  # ----------------------------------------------------------
  # Nginx 反向代理 (入口)
  # ----------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: docgen-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - frontend-dist:/usr/share/nginx/html:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      kong:
        condition: service_healthy
    networks:
      - frontend-network
      - backend-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ----------------------------------------------------------
  # Kong API 网关
  # ----------------------------------------------------------
  kong:
    image: kong:3.6-alpine
    container_name: docgen-kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_PORT: 5432
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: ${KONG_PG_PASSWORD}
      KONG_PG_DATABASE: kong
      KONG_PROXY_LISTEN: "0.0.0.0:8000, 0.0.0.0:8443 ssl"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_ADMIN_GUI_LISTEN: "0.0.0.0:8002"
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,jwt,rate-limiting,ip-restriction
    expose:
      - "8000"
      - "8001"
      - "8002"
    volumes:
      - ./kong/kong.yml:/var/lib/kong/kong.yml:ro
      - kong-data:/var/lib/kong
    depends_on:
      kong-db:
        condition: service_healthy
    networks:
      - backend-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ----------------------------------------------------------
  # Kong 数据库 (PostgreSQL)
  # ----------------------------------------------------------
  kong-db:
    image: postgres:15-alpine
    container_name: docgen-kong-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: ${KONG_PG_PASSWORD}
      POSTGRES_DB: kong
    volumes:
      - kong-db-data:/var/lib/postgresql/data
    networks:
      - data-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong -d kong"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ----------------------------------------------------------
  # 应用主数据库 (PostgreSQL 15)
  # ----------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: docgen-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: docgen
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: docgen_platform
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - data-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docgen -d docgen_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ----------------------------------------------------------
  # Redis 缓存 / 会话存储
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: docgen-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis-data:/data
    networks:
      - data-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ----------------------------------------------------------
  # MinIO 对象存储 (文档文件)
  # ----------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: docgen-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio-data:/data
    networks:
      - data-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ----------------------------------------------------------
  # Zookeeper (Kafka 依赖)
  # ----------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: docgen-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - data-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", 'echo "ruok" | nc localhost 2181 | grep imok']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ----------------------------------------------------------
  # Apache Kafka (异步文档处理消息队列)
  # ----------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: docgen-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    expose:
      - "9092"
      - "9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS},PLAINTEXT_HOST://localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - data-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", 'kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ----------------------------------------------------------
  # Euro-Office 在线文档编辑器
  # ----------------------------------------------------------
  euro-office:
    image: ghcr.io/euro-office/documentserver:latest
    container_name: docgen-euro-office
    restart: unless-stopped
    environment:
      EURO_OFFICE_JWT_SECRET: ${EURO_OFFICE_JWT_SECRET}
      EURO_OFFICE_JWT_ENABLED: "true"
      EURO_OFFICE_DB_HOST: postgres
      EURO_OFFICE_DB_PORT: 5432
      EURO_OFFICE_DB_NAME: docgen_platform
      EURO_OFFICE_DB_USER: docgen
      EURO_OFFICE_DB_PASSWORD: ${POSTGRES_PASSWORD}
      EURO_OFFICE_REDIS_HOST: redis
      EURO_OFFICE_REDIS_PORT: 6379
      EURO_OFFICE_REDIS_PASSWORD: ${REDIS_PASSWORD}
    expose:
      - "8080"
    volumes:
      - euro-office-data:/var/lib/euro-office
      - euro-office-logs:/var/log/euro-office
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend-network
      - data-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/healthcheck || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ----------------------------------------------------------
  # 后端 API 服务 (Spring Boot 3.2 + Java 17)
  # ----------------------------------------------------------
  backend:
    build:
      context: ../backend
      dockerfile: docker/Dockerfile
    container_name: docgen-backend
    restart: unless-stopped
    environment:
      # Spring Boot 配置
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/docgen_platform
      SPRING_DATASOURCE_USERNAME: docgen
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_PROFILES_INCLUDE: prod
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      # 文件存储
      FILE_UPLOAD_DIR: /app/uploads
      FILE_OUTPUT_DIR: /app/outputs
      # Kafka（可选）
      KAFKA_ENABLED: "true"
      KAFKA_BROKERS: kafka:9092
      # Euro-Office
      EURO_OFFICE_URL: http://euro-office:8080
      EURO_OFFICE_JWT_SECRET: ${EURO_OFFICE_JWT_SECRET}
      # JVM 参数
      JAVA_OPTS: ${JAVA_OPTS:--Xms256m -Xmx512m -XX:+UseG1GC -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0}
      # 时区
      TZ: Asia/Shanghai
    expose:
      - "3001"
    volumes:
      - backend-uploads:/app/uploads
      - backend-outputs:/app/outputs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - backend-network
      - data-network
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3001/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ----------------------------------------------------------
  # 前端服务 (Vue3 + Nginx)
  # ----------------------------------------------------------
  frontend:
    build:
      context: ../frontend
      dockerfile: docker/Dockerfile
    container_name: docgen-frontend
    restart: unless-stopped
    volumes:
      - frontend-dist:/usr/share/nginx/html
    depends_on:
      kong:
        condition: service_healthy
    networks:
      - frontend-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ----------------------------------------------------------
  # Prometheus 监控服务
  # ----------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: docgen-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - backend-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ----------------------------------------------------------
  # Grafana 可视化监控面板
  # ----------------------------------------------------------
  grafana:
    image: grafana/grafana:10.2.0
    container_name: docgen-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-grafana_secret_2026}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - backend-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

# ============================================================
# 网络配置 - 三层网络隔离
# ============================================================
networks:
  frontend-network:
    name: docgen-frontend-network
    driver: bridge
    internal: true
  backend-network:
    name: docgen-backend-network
    driver: bridge
    internal: true
  data-network:
    name: docgen-data-network
    driver: bridge
    internal: true

# ============================================================
# 数据卷
# ============================================================
volumes:
  postgres-data:
    name: docgen-postgres-data
  kong-db-data:
    name: docgen-kong-db-data
  kong-data:
    name: docgen-kong-data
  redis-data:
    name: docgen-redis-data
  minio-data:
    name: docgen-minio-data
  zookeeper-data:
    name: docgen-zookeeper-data
  zookeeper-logs:
    name: docgen-zookeeper-logs
  kafka-data:
    name: docgen-kafka-data
  euro-office-data:
    name: docgen-euro-office-data
  euro-office-logs:
    name: docgen-euro-office-logs
  frontend-dist:
    name: docgen-frontend-dist
  nginx-logs:
    name: docgen-nginx-logs
  backend-uploads:
    name: docgen-backend-uploads
  backend-outputs:
    name: docgen-backend-outputs
  prometheus-data:
    name: docgen-prometheus-data
  grafana-data:
    name: docgen-grafana-data
